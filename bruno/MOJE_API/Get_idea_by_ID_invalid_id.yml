info:
  name: Get_idea_by_ID_invalid_id
  type: http
  seq: 11

http:
  method: GET
  url: http://localhost:3000/ideas/abc
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("Status code is 400", function () {
          expect(res.getStatus()).to.equal(400);
        });

        test("Reports an invalid id", function () {
          expect(body.error).to.equal("Invalid id");
        });

        test("Flags the id field", function () {
          const idError = body.details.find((d) => d.field === "id");
          expect(idError).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
