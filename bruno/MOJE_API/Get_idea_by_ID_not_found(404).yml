http:
  method: GET
  url: http://localhost:3000/ideas/999
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("Status code is 404", function () {
          expect(res.getStatus()).to.equal(404);
        });

        test("Returns the not-found message", function () {
          expect(body.error).to.equal("Idea not found");
        });

